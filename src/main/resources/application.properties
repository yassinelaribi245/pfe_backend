# ── Database ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/star_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:star_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:star2026!}
 
# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
 
# ── Server ────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=star-api
 
# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:starAssurancesSecretKey2026VeryLongSecretKeyForSecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}
 
# ── File upload settings ──────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
 
# Where images are stored on disk
app.upload.dir=uploads/offers
 
# Enable lazy loading for @Basic(fetch=LAZY) fields (e.g. BYTEA images)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true